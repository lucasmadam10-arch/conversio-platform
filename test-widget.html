<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Widget Test Page — Conversio</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 { margin: 0 0 8px; font-size: 28px; color: #111; }
    p { color: #6b7280; margin: 0 0 24px; }
    .badge {
      display: inline-block;
      background: #ecfdf5;
      color: #059669;
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
    }
    .hint {
      margin-top: 32px;
      padding: 16px;
      background: #f9fafb;
      border-radius: 8px;
      font-size: 13px;
      color: #6b7280;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🛍️ Demo Store</h1>
    <p>This is a sample customer-facing page.<br/>The chat widget should appear in the bottom-right corner.</p>
    <span class="badge">✓ Widget loaded</span>
    <div class="hint">
      <strong>How to test:</strong><br/>
      1. Click the chat bubble (bottom-right)<br/>
      2. Send a message as a "visitor"<br/>
      3. Open <a href="http://localhost:5173" target="_blank">localhost:5173</a> to reply as an agent
    </div>
  </div>

  <!-- Conversio Widget -->
  <script>
    window.Conversio = window.Conversio || function() {
      (window.Conversio.q = window.Conversio.q || []).push(arguments);
    };
    window.Conversio._tenantSlug = 'demo';
  </script>
  <script
    async
    src="http://localhost:5175/widget.js"
    data-tenant="demo"
  ></script>
</body>
</html>
